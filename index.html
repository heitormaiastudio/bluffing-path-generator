function generateQuestion(){
  let available = questions.filter(q => !usedQuestions.includes(q.question));

  if(available.length === 0){
    usedQuestions = [];
    available = questions;
  }

  const selected = available[Math.floor(Math.random() * available.length)];
  usedQuestions.push(selected.question);

  document.getElementById("question").innerText = "Your question: " + selected.question;
  document.getElementById("answers").innerHTML =
    "<b>Answer options:</b><br>- " + selected.answers.join("<br>- ");
