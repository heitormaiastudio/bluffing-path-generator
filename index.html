<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bluffing Path | Generator</title>

<style>
    :root {
        --primary: #1b2040;
        --accent: #2e60b2; 
        --bg-page: #fcfcfc; 
        --card: #ffffff;
        --text-main: #333333;
        --text-muted: #666666;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-page);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        color: var(--text-main);
    }

    .header-logo {
        max-width: 280px;
        height: auto;
        margin-bottom: 30px;
    }

    .container {
        background: var(--card);
        padding: 40px;
        border-radius: 28px;
        width: 100%;
        max-width: 420px;
        text-align: center;
        box-shadow: 0 15px 40px rgba(27, 32, 64, 0.08); 
        margin-bottom: 30px;
        border: 1px solid #f0f0f0;
    }

    h2 { margin-bottom: 8px; color: var(--primary); font-size: 22px; font-weight: 700; }
    p { color: var(--text-muted); font-size: 14px; margin-bottom: 25px; margin-top: 0; }

    input#code {
        width: 85%;
        padding: 14px;
        border: 2px solid #eee;
        border-radius: 14px;
        margin-bottom: 20px;
        text-align: center;
        font-size: 16px;
        outline: none;
        color: var(--primary);
    }

    .wh-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin: 25px 0;
    }

    .btn-wh {
        background: #f4f6f9;
        color: var(--primary);
        border: none;
        padding: 15px 2px;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
        text-transform: uppercase;
        font-size: 12px;
    }

    .btn-wh:hover {
        background: var(--primary);
        color: white;
    }

    .display-area {
        background: #fdfdfd;
        padding: 30px;
        border-radius: 20px;
        margin-top: 10px;
        min-height: 120px;
        border: 1px solid #f0f0f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    #question-text {
        font-size: 18px;
        font-weight: 600;
        color: #111;
        line-height: 1.5;
    }

    .btn-help {
        background: white;
        border: 1px solid #ddd;
        color: #777;
        padding: 10px 20px;
        border-radius: 25px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 20px;
        display: none; 
        text-transform: uppercase;
        transition: all 0.2s;
    }

    .btn-help:hover { 
        border-color: var(--accent); 
        color: var(--accent); 
    }

    #answers-area {
        margin-top: 18px;
        text-align: left;
        font-size: 13px;
        background: #f9fbff;
        padding: 18px;
        border-radius: 14px;
        color: #444;
        width: 90%;
        border: 1px solid #e8f0fe;
    }

    .hidden { display: none !important; }

    .footer-container {
        text-align: center;
        margin-top: 10px;
        width: 100%;
        max-width: 420px;
    }

    .developed-by {
        display: block;
        font-weight: 600;
        color: #bbb;
        text-transform: uppercase;
        font-size: 10px;
        margin-bottom: 5px;
    }

    .footer-logo {
        max-width: 140px;
        height: auto;
        display: block;
        margin: 0 auto;
        opacity: 0.8;
    }

    #login-btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 14px 50px;
        border-radius: 14px;
        font-weight: 700;
        cursor: pointer;
    }
</style>
</head>
<body>

<img src="logobpps.png" alt="Bluffing Path Logo" class="header-logo">

<div class="container" id="login">
    <h2>Access Code</h2>
    <p>Please enter your teacher code</p>
    <input type="password" id="code" placeholder="••••••••">
    <br>
    <button id="login-btn" onclick="checkCode()">Enter Game</button>
</div>

<div class="container hidden" id="app">
    <h2>Question Generator</h2>
    <p>Select a category to play:</p>
    
    <div class="wh-grid">
        <button class="btn-wh" onclick="generateByTag('WHAT')">What</button>
        <button class="btn-wh" onclick="generateByTag('WHERE')">Where</button>
        <button class="btn-wh" onclick="generateByTag('WHEN')">When</button>
        <button class="btn-wh" onclick="generateByTag('WHO')">Who</button>
        <button class="btn-wh" onclick="generateByTag('WHY')">Why</button>
        <button class="btn-wh" onclick="generateByTag('HOW')">How</button>
        <button class="btn-wh" style="grid-column: span 3; background: #e8f0fe;" onclick="generateByTag('WHICH')">Which</button>
    </div>

    <div class="display-area">
        <div id="question-text">Choose a category...</div>
        <button id="help-btn" class="btn-help" onclick="toggleHelp()">Need Help? 💡</button>
        <div id="answers-area" class="hidden"></div>
    </div>
</div>

<div class="footer-container">
    <span class="developed-by">Developed by:</span>
    <img src="logo-maia.png" alt="Maia Studio" class="footer-logo">
</div>

<script>
const accessCode = "BLUFF2026";
let currentAnswers = [];

const questions = {
    "WHAT": [
        {q: "What is my favorite pizza flavor?", a: ["My favorite pizza flavor is Pepperoni.", "My favorite pizza flavor is Margherita.", "My favorite pizza flavor is Four Cheese."]},
        {q: "What do I usually do after school?", a: ["I usually study and relax at home.", "I usually do my homework and watch videos.", "I usually play with my friends after school."]},
        {q: "What do I always forget to bring to school?", a: ["I always forget to bring my notebook.", "I always forget to bring my pencil case.", "I always forget to bring my homework."]},
        {q: "What movie do I know all the lines from?", a: ["I know all the lines from Harry Potter.", "I know all the lines from Toy Story.", "I know all the lines from Spider-Man."]},
        {q: "What superpower do I wish I had?", a: ["I wish I had the power to fly.", "I wish I had the power of invisibility.", "I wish I had the power of teleportation."]}
    ],
    "WHERE": [
        {q: "Where do I want to go for my next school trip?", a: ["I want to go to the zoo for the trip.", "I want to go to a museum for the trip.", "I want to go to a park for the trip."]},
        {q: "Where do I want to travel with my best friends?", a: ["I want to travel to another country.", "I want to travel to the beach.", "I want to travel to a big city."]},
        {q: "Where do I relax the most?", a: ["I relax the most at home in my room.", "I relax the most at the beach.", "I relax the most at my grandmother's house."]},
        {q: "Where do I put my backpack when I get home?", a: ["I put my backpack in my room.", "I put my backpack in the living room.", "I put my backpack near the door."]},
        {q: "Where do I hate going?", a: ["I hate going to the dentist.", "I hate going to the supermarket.", "I hate going to boring places."]}
    ],
    "WHEN": [
        {q: "When do I usually play online with my friends?", a: ["I usually play online on weekends.", "I usually play online at night.", "I usually play online after school."]},
        {q: "When do I usually get home from school?", a: ["I usually get home at 1 PM.", "I usually get home at 4 PM.", "I usually get home in the evening."]},
        {q: "When do I feel the most sleepy during the day?", a: ["I feel sleepy in the morning.", "I feel sleepy after lunch.", "I feel sleepy at night."]},
        {q: "When do I feel like eating something sweet?", a: ["I feel like eating sweets after lunch.", "I feel like eating sweets at night.", "I feel like eating sweets in the afternoon."]},
        {q: "When do I usually use my phone the most?", a: ["I use my phone the most at night.", "I use my phone the most in my free time.", "I use my phone the most before I sleep."]}
    ],
    "WHO": [
        {q: "Who do I consider my hero in real life?", a: ["I consider my dad my hero.", "I consider my mom my hero.", "I consider a famous person my hero."]},
        {q: "Who do I look like in my family?", a: ["I look like my mother.", "I look like my father.", "I look like my grandfather."]},
        {q: "Who is the best actor or actress in my opinion?", a: ["I think Tom Holland is the best actor.", "I think Zendaya is the best actress.", "I think Jenna Ortega is the best actress."]},
        {q: "Who do I think is the funniest person in the world?", a: ["I think a famous comedian is the funniest.", "I think my best friend is the funniest.", "I think my brother is the funniest."]},
        {q: "Who do I usually send memes to?", a: ["I usually send memes to my best friend.", "I usually send memes to my group chat.", "I usually send memes to my siblings."]}
    ],
    "WHY": [
        {q: "Why do I want to visit another country?", a: ["I want to visit another country to explore new places.", "I want to visit another country to learn a language.", "I want to visit another country to meet new people."]},
        {q: "Why do I study English?", a: ["I study English because it is very important.", "I study English to travel and communicate.", "I study English because I enjoy it."]},
        {q: "Why do I like my favorite subject?", a: ["I like it because the subject is very interesting.", "I like it because I understand everything.", "I like it because the classes are fun."]},
        {q: "Why do I prefer staying at home sometimes?", a: ["I prefer staying at home because I feel comfortable.", "I prefer staying at home because I like my space.", "I prefer staying at home because I feel relaxed."]},
        {q: "Why is AI amazing?", a: ["AI is amazing because it answers all my questions.", "AI is amazing because it is very fast and useful.", "AI is amazing because it makes my life easier."]}
    ],
    "HOW": [
        {q: "How do I get to school every morning?", a: ["I get to school by car every morning.", "I get to school by bus every morning.", "I get to school on foot every morning."]},
        {q: "How do I use my free time on rainy days?", a: ["On rainy days I watch videos or use my phone.", "On rainy days I stay inside and relax.", "On rainy days I do indoor activities."]},
        {q: "How do I celebrate my birthday?", a: ["I celebrate my birthday with my family.", "I celebrate my birthday with a big party.", "I celebrate my birthday at a restaurant."]},
        {q: "How do I feel about speaking in front of the class?", a: ["I feel nervous when I speak in front of the class.", "I feel confident when I speak in front of the class.", "I feel excited when I speak in front of the class."]},
        {q: "How do I prepare for a test?", a: ["I study my notes to prepare for a test.", "I review the book to prepare for a test.", "I ask for help to prepare for a test."]}
    ],
    "WHICH": [
        {q: "Which app do I use the most?", a: ["I use Instagram the most.", "I use TikTok the most.", "I use WhatsApp the most."]},
        {q: "Which place do I prefer the most?", a: ["I prefer the beach the most.", "I prefer the mall the most.", "I prefer my house the most."]},
        {q: "Which school subject do I find the most boring?", a: ["I find Math the most boring subject.", "I find History the most boring subject.", "I find Geography the most boring subject."]},
        {q: "Which hobby do I want to start one day?", a: ["I want to start playing the guitar one day.", "I want to start drawing one day.", "I want to start a new sport one day."]},
        {q: "Which movie genre do I like the most?", a: ["I like action movies the most.", "I like comedy movies the most.", "I like horror movies the most."]}
    ]
};

function checkCode(){
    if(document.getElementById("code").value === accessCode){
        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
    } else {
        alert("Invalid code");
    }
}

function generateByTag(tag) {
    const list = questions[tag];
    const selected = list[Math.floor(Math.random() * list.length)];
    displayQuestion(selected);
}

function displayQuestion(item) {
    document.getElementById("question-text").innerText = item.q;
    currentAnswers = item.a;
    
    const area = document.getElementById("answers-area");
    area.classList.add("hidden");
    area.innerHTML = "";
    
    const btn = document.getElementById("help-btn");
    btn.style.display = "inline-block"; 
    btn.innerText = "Need Help? 💡";
}

function toggleHelp() {
    const area = document.getElementById("answers-area");
    const btn = document.getElementById("help-btn");
    
    if(area.classList.contains("hidden")) {
        area.innerHTML = "<strong>Answer Options:</strong><br>• " + currentAnswers.join("<br>• ");
        area.classList.remove("hidden");
        btn.innerText = "Hide Options";
    } else {
        area.classList.add("hidden");
        btn.innerText = "Need Help? 💡";
    }
}
</script>

</body>
</html>
