<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrieving Path: Black Dog Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .header { text-align: center; margin-bottom: 20px; width: 100%; }
        .logo-school { height: 120px; margin-bottom: 15px; }
        .logo-game { max-width: 300px; display: block; margin: 0 auto; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 90%; max-width: 450px; text-align: center; position: relative; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-who { background-color: #7d6fb3; }
        .btn-what { background-color: #5d4a99; }
        .btn-where { background-color: #4a3b80; }
        .btn-when { background-color: #3a2d66; }
        .btn-why { background-color: #2a1f4d; }
        .btn-which { background-color: #1a1233; }
        .question-box { display: none; }
        
        .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .sc-help { background: #ff9800; color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: none; }
        
        .question-text { font-size: 20px; margin: 15px 0; font-weight: 600; color: #2a1f4d; line-height: 1.4; }
        
        .sc-box { display: none; background: #fff3e0; border: 1px dashed #ff9800; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; color: #e65100; }
        .answer-text { display: none; margin-top: 15px; padding: 15px; background-color: #e8f5e9; border-left: 5px solid #4caf50; font-style: italic; color: #2e7d32; text-align: left; font-size: 15px; }
        
        .btn-reveal { background-color: #4caf50; width: 100%; margin-top: 10px; }
        .btn-back { background-color: #888; width: 100%; margin-top: 15px; }
        .footer { margin-top: 30px; text-align: center; color: #666; font-size: 12px; }
        .logo-maia { height: 35px; margin-top: 5px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo-school.png" alt="School Logo" class="logo-school">
        <img src="logo-rp.png" alt="Retrieving Path" class="logo-game">
    </div>
    <div class="container">
        <div id="menu" class="menu-grid">
            <button class="btn-who" onclick="showQuestion('who')">WHO</button>
            <button class="btn-what" onclick="showQuestion('what')">WHAT</button>
            <button class="btn-where" onclick="showQuestion('where')">WHERE</button>
            <button class="btn-when" onclick="showQuestion('when')">WHEN</button>
            <button class="btn-why" onclick="showQuestion('why')">WHY</button>
            <button class="btn-which" onclick="showQuestion('which')">WHICH</button>
        </div>

        <div id="question-display" class="question-box">
            <div class="q-header">
                <p id="cat-label" style="color: #888; font-size: 12px; text-transform: uppercase; margin: 0;"></p>
                <button class="sc-help" onclick="toggleSC()" title="Show Success Criteria">?</button>
            </div>
            
            <div id="sc-content" class="sc-box"></div>
            <div id="question-content" class="question-text"></div>
            
            <button class="btn-reveal" onclick="revealAnswer()">Reveal Truth</button>
            <div id="answer-content" class="answer-text"></div>
            <button class="btn-back" onclick="goBack()">Back to Categories</button>
        </div>
    </div>
    <div class="footer">
        <div>Designed and offered by:</div>
        <img src="logo-maia.png" alt="Maia Studio" class="logo-maia">
    </div>

    <script>
        const questions = {
            who: [
                {q:"Who was the first character to experience 'irrational fear'?", sc:"Mention the name of the father and use 'spotted'.", a:"Mr. Hope was the first one."},
                {q:"Who stayed 'gloomy' and hid under the duvet?", sc:"List all characters except Small.", a:"The older members of the family (Mr. Hope, Mrs. Hope, Adeline, and Maurice)."},
                {q:"Who was the only one not affected by the morbid atmosphere?", sc:"Focus on the youngest member.", a:"Small, the youngest child."}
            ],
            what: [
                {q:"What did the family do that showed they had a 'morbid' imagination?", sc:"Compare the dog to an extinct animal.", a:"They imagined the dog was the size of a T-Rex or an Elephant."},
                {q:"What did Small do to make the dog shrink?", sc:"Explain the action and her lack of fear.", a:"She showed no fear and played a game of chase with it."}
            ],
            where: [
                {q:"Where did the family hide because of their 'irrational' fear?", sc:"List 2 specific places inside the house.", a:"Under the covers, under the table, and behind the curtains."},
                {q:"Where did the dog grow to its most 'gloomy' and giant size?", sc:"Mention the location relative to the house.", a:"Outside the house, in the family's mind/perception."}
            ],
            why: [
                {q:"Why is the family's fear described as 'irrational'?", sc:"Explain that the size was only in their minds.", a:"Because the dog wasn't actually a monster; their fear made it look big."},
                {q:"Why did Small go outside when everyone else was scared?",
